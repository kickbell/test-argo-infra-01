apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deply
  namespace: delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-app
  template:
    metadata:
      labels:
        app: front-app
    spec:
      containers:
      - name: react-con
        image: kickbell/front_site:1.0 # 우리가 도커 허브에 올린 이미지
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
